/* ── TEMA OSCURO/CLARO ── */
function toggleTheme(){
  var html=document.documentElement;
  var isDark=html.classList.contains('dark');
  if(isDark){
    html.classList.remove('dark');
    html.classList.add('light');
    localStorage.setItem('SISCOP-theme','light');
  } else {
    html.classList.remove('light');
    html.classList.add('dark');
    localStorage.setItem('SISCOP-theme','dark');
  }
  _syncThemeIcons();
}
function _syncThemeIcons(){
  var isDark=document.documentElement.classList.contains('dark');
  var moon=$('ico-moon'), sun=$('ico-sun');
  if(moon) moon.style.display=isDark?'none':'';
  if(sun)  sun.style.display=isDark?'':'none';
}

  type=type||'ok'; dur=dur||4000;

/**
 * Navegador Principal (Router)
 * Gestiona el intercambio de vistas, actualización de UI y triggers de datos.
 * @param {string} page - El ID de la página destino (ej: 'dashboard', 'meta').
 */
// Actualizamos navTo para mayor seguridad
function navTo(page){
  // VALIDACIÓN DE SEGURIDAD PARA LECTOR
  if(S.perfil && S.perfil.rol === 'Lector'){
    var prohibidas = ['upload', 'export', 'historial', 'usuarios'];
    if(prohibidas.indexOf(page) > -1){
      toast('No tienes permisos para acceder a esta sección', 'warn');
      // Si intenta entrar a una prohibida, lo forzamos al dashboard
      if(page !== 'dashboard') { navTo('dashboard'); return; }
    }
  }

  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.nav-item').forEach(function(n){ n.classList.remove('active'); });
  
  var pg = $('page-' + page); 
  if (pg) pg.classList.add('active');
  
  document.querySelectorAll('.nav-item').forEach(function(b){
    if (b.getAttribute('onclick') && b.getAttribute('onclick').indexOf("'" + page + "'") > -1) {
      b.classList.add('active');
    }
  });
  
  $('topbar-title').textContent = PAGE_TITLES[page] || page;
  
  var iconEl = $('topbar-section-icon');
  if (iconEl){
    var d = PAGE_ICONS[page] || '';
    iconEl.innerHTML = '<svg viewBox="0 0 24 24">' + d + '</svg>';
  }
  
  setTitle(PAGE_TITLES[page] || page);
  closeSidebar();
  
  if (page === 'dashboard') loadDashboard();
  if (page === 'historial')  loadHistorial();
  if (page === 'export')     loadExportLog();
  if (page === 'historico')  loadHistorico();
}

function iniciarSeguridad(){
  _syncThemeIcons();
  setTitle('Verificando acceso...');
  
  gasCall('obtenerPerfilUsuario',[],function(res){
    if(!res||!res.ok){
      $('global-loader').style.display='none';
      $('access-denied').style.display='flex';
      return;
    }
    
    S.perfil = res.perfil;
    adaptarInterfazAlRol(); // <--- Aquí dentro se llama a navTo('dashboard')
    
    // Ocultamos el loader con una transición suave después de que navTo ya hizo su trabajo
    setTimeout(function(){
      $('global-loader').style.opacity='0';
      setTimeout(function(){ $('global-loader').style.display='none'; }, 350);
    }, 500);

    iniciarInactividad();
    verificarPrecheck();
    _cargarPeriodoInicial();

  }, function(err){
    $('global-loader').style.display='none';
    $('access-denied').style.display='flex';
  });
}

function adaptarInterfazAlRol(){
  var p = S.perfil;
  $('ui-user-name').textContent = p.nombre;
  $('ui-user-role').textContent = p.rol;
  $('ui-avatar').textContent = p.nombre.charAt(0).toUpperCase();

  if(p.rol === 'Lector'){
    // 1. Ocultar sección de Proceso completa (Label + Botón Cargar)
    if($('nav-sec-proceso')) $('nav-sec-proceso').style.display = 'none';
    
    // 2. Ocultar botón de Exportar del menú
    if($('nav-export')) $('nav-export').style.display = 'none';
    
    // 3. Ocultar Historial de Procesos (ya estaba)
    if($('nav-historial')) $('nav-historial').style.display = 'none';
    
    // (Opcional) Mantener las protecciones visuales dentro de la vista si llegara a entrar
    ['ec-completo','ec-observados','ec-meta','ec-csv'].forEach(function(id){
      var el=$(id); if(!el) return;
      el.classList.add('ec-disabled');
      el.onclick=null;
    });
  }

  if(p.rol === 'Admin'){
    if($('nav-sec-admin')) $('nav-sec-admin').style.display = 'block';
    cargarTablaUsuarios();
  }
  
  loadMetaSelect();
  navTo('dashboard'); // Redirigir siempre al dashboard al inicio
}

function _cargarPeriodoInicial() {
  gasCall('obtenerPeriodos', [], function(res) {
    if (!res || !res.ok || !res.periodos || res.periodos.length === 0) {
      var anioActual = new Date().getFullYear();
      $('sb-periodo-anio').textContent = anioActual;
      return;
    }
    _periodos = res.periodos;

    var anioActual = res.anioActual || new Date().getFullYear();

    var periodoDefault =
      (res.periodoActivoSsId
        ? _periodos.find(function(p) { return p.ssId === res.periodoActivoSsId; })
        : null) ||
      _periodos.find(function(p) { return p.periodo === anioActual; }) ||
      _periodos[0];

    if (periodoDefault) {
      _periodoActivo = periodoDefault;
      $('sb-periodo-anio').textContent = periodoDefault.periodo;
      $('sb-periodo').textContent = periodoDefault.mesCorte >= 0
        ? MESES[periodoDefault.mesCorte] + ' ' + periodoDefault.periodo
        : 'Sin proceso';
      gasCall('cambiarPeriodoActivo', [periodoDefault.ssId, periodoDefault.periodo], null, null);
    }
  }, null);
}

/* ── TRACKING DE INACTIVIDAD (30 min) ── */
var _inactTimer;
function iniciarInactividad(){
  var ms=30*60*1000;
  function reset(){clearTimeout(_inactTimer);_inactTimer=setTimeout(bloquear,ms);}
  ['mousemove','keypress','click','touchstart'].forEach(function(e){document.addEventListener(e,reset,{passive:true});});
  reset();
}
function bloquear(){
  $('app').style.filter='blur(10px)';
  var d=$('access-denied');
  
  d.querySelector('h1').textContent='Sesión Bloqueada';
  d.querySelector('.denied-icon').innerHTML='<svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>';
  $('denied-message').innerHTML='<b>30 minutos de inactividad.</b><br>Los datos han sido ocultados por seguridad.';
  
  var btn=d.querySelector('button'); 
  btn.textContent='Recargar sesión'; 
  
  // ✨ SOLUCIÓN PRO: Reinicio en caliente (Soft Reload)
  btn.onclick = function() {
    btn.textContent = 'Verificando...'; // Feedback visual rápido
    btn.disabled = true;                // Evitamos doble clic
    
    // 1. Quitamos el bloqueo visual
    $('app').style.filter = 'none';
    d.style.display = 'none';
    
    // 2. Volvemos a disparar el flujo principal como si recién abriera la app
    iniciarSeguridad();
    
    // Restauramos el botón por si se vuelve a bloquear en el futuro
    setTimeout(function(){ 
      btn.textContent = 'Recargar sesión'; 
      btn.disabled = false; 
    }, 2000);
  };
  
  d.style.display='flex';
}
