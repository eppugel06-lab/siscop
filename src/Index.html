  <script>
    /**
     * GESTIÓN DE TEMAS (Dark/Light):
     * Se ejecuta antes de renderizar el body para evitar el "destello blanco" (Flash of Unstyled Content).
     */
    (function(){
      var t = localStorage.getItem('SISCOP-theme');
      var sys = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      // Prioriza preferencia guardada, sino usa la del sistema operativo
      document.documentElement.className = (t === 'dark' || (t === null && sys)) ? 'dark' : 'light';
    })();
  </script>
